services:
  - type: web
    name: quantum-guard-backend
    env: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/v2/health
    envVars:
      - key: ENV
        value: production
      - key: API_HOST
        value: 0.0.0.0
      - key: PROVER_PORT
        value: "8001"
      - key: PROVER_URL
        value: http://localhost:8001
      - key: LOG_LEVEL
        value: INFO
      - key: RATE_LIMIT_RPM
        value: "60"
      - key: STARKNET_CHAIN_ID
        value: SN_SEPOLIA
      - key: STARKNET_RPC
        value: https://free-rpc.nethermind.io/sepolia-juno/v0_7
      - key: DATABASE_URL
        fromDatabase:
          name: quantum-guard-postgres
          property: connectionString
      - key: CORS_ORIGINS
        value: https://zentropy-steel.vercel.app,https://zentropy-private.vercel.app,https://zentropy-private.onrender.com
      - key: MERKLE_STORAGE_DIR
        value: /tmp/merkle_batches
      - key: PYTHON_DOTENV_DISABLED
        value: "1"
      - key: STARKNET_PRIVATE_KEY
        sync: false
      - key: STARKNET_ACCOUNT_ADDRESS
        sync: false
      - key: QUANTUMGUARD_MASTER_SECRET
        sync: false
      - key: BOOTSTRAP_SECRET
        sync: false

databases:
  - name: quantum-guard-postgres
    databaseName: quantumguard
    user: quantumguard
