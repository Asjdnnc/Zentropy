services:
  - type: web
    name: quantum-guard-prover
    rootDir: Quantum-Guard
    plan: free
    env: docker
    dockerfilePath: ./Dockerfile.prover
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8001"

  - type: web
    name: quantum-guard-backend
    rootDir: Quantum-Guard
    plan: free
    env: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/v2/health
    envVars:
      - key: ENV
        value: production
      - key: API_HOST
        value: 0.0.0.0
      - key: PROVER_URL
        value: https://quantum-guard-prover.onrender.com
      - key: LOG_LEVEL
        value: INFO
      - key: RATE_LIMIT_RPM
        value: "60"
      - key: STARKNET_CHAIN_ID
        value: SN_SEPOLIA
      - key: STARKNET_RPC
        value: https://starknet-sepolia.g.alchemy.com/starknet/version/rpc/v0_8/kgLyrFj6uapYvZoWP3Ywv
      - key: DATABASE_URL
        fromDatabase:
          name: quantum-guard-postgres
          property: connectionString
      - key: CORS_ORIGINS
        value: https://zentropy-steel.vercel.app,https://zentropy-private.onrender.com,https://zentropywallet.vercel.app
      - key: MERKLE_STORAGE_DIR
        value: /tmp/merkle_batches
      - key: PYTHON_DOTENV_DISABLED
        value: "1"
      - key: STARKNET_PRIVATE_KEY
        sync: false
      - key: STARKNET_ACCOUNT_ADDRESS
        sync: false
      - key: QUANTUMGUARD_MASTER_SECRET
        sync: false
      - key: BOOTSTRAP_SECRET
        sync: false

databases:
  - name: quantum-guard-postgres
    plan: free
    databaseName: quantumguard
    user: quantumguard
